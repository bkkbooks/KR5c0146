front:
  text: 太上玄靈北斗本命延生真經注卷之一
  hash: sha256:25987a9ed04ac20b3d2f0417e53115160f62d2b772ee16a20cfb741acde27d87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0146_HFL_001-001a, image: hfl/0527/0527-020.png}
body:
  text: 玄陽子徐道齡集注乾陽子徐道玄校正太上者極大為太最高為上乃太極無上也惟三清人君之父得以稱之玄靈者乃天地之玄氣七政之精靈北斗之慧光世人之性命也人稟清靈之氣結成此身遂生魂魄血氣也北斗者天地之大德大化真氣正道結為玄象運乎中天建四時均五行生殺萬物統治天地察録善惡無一物不係其所管也本命者天一生水蓋自北斗生也斗在北旺於水司生司殺養物濟人之都會也人稟天地之氣為男為女可壽可夭皆出乎北斗之政令也人能認本命神不越修奉念本命號使不虛過則得厄解災消而獲福無量矣延生者乃北斗期世人修身向道使保天年人能禮斗朝真即得延生之道也故天不動則不能長覆斗不動而豈能常輪人不延焉得長生也真者即真妙之義不可測之玄玄也經者經也若經久傳訛似有縱緯而經縷不堪紋理參錯則成瑕玼也又經者徑也徑不通直如入道修真之人迷其要路也又經者絡也若人經絡失度則生疾也經若不明則不得真玄也爾時太上老君爾時者謂當太上説經之時也老君乃天地之本始造化之徂宗也歷代應現未有誕生之迹將欲和光同塵而立世教乃先命玄妙玉女即無上元君為天水尹氏之女名益壽適仙人李靈飛靈飛本臯陶之後感其父李慶賔白日飛升之事精修大道亦百餘歲當老君未誕而升天殷朝十八世王陽甲踐祚之十七年庚申歲寄胎在孕鍊真八十一年至二十二王武丁之九年庚辰歲二月十五日卯時降生于亳今太清宫舊宅存焉周武王時為柱下史昭王癸丑年過函谷關授尹喜真人道德五千言計二百七十四年至甲寅四月二十八日老君白日升天期尹喜真人千日外會於蜀青羊肆中至丁巳年之蜀再遇老君乃從仙駕周遊九天隨方設教孔聖師之至赧王時計九百九十六年已魏明帝贊曰為周柱史經九百年唐太學博士吳揚昊贊云老君變通靈應難測既生啇日又仕周時計其始終乃歷千載後降成都授此經訣乃漢桓帝永壽元年乙未正月初七日又自唐太宗時以仁愛之道説經於羊角山宋政和年間降于茅山玉晨觀授梁光映加句天童護命經之後至今靈驗之事不可枝舉老君生時九龍吐水化為九井灌洗身形生而鬚髮皓白有七十二相八十一好行步蓮華乃至于九左手指天右手指地曰天上天下唯我獨尊我當闡揚無上道法普及一切衆生時有自然天衣挂體九日之中身長九尺感天神贊十號之名號曰太上老圓神智天上尊帝王師大丈夫大仙尊天人父無為上人大慈仁者元始天尊今者略述太上紀號同志皈依各獲福報也以永壽元年正月七日太上哀憫衆生屢降成都授與天師靜應真君延生經訣五斗符相靈文五斗真君名字永壽元年正月七日授此北斗玄靈本命真經十五日授南斗六司延壽度人妙經及靈寶妙道五斗真經至永壽二年正月初七日説東斗長生護命真經十五日復説西斗大計護身經又以天師真人其能修謹奉行老君復現全身於清虛中升玉局座宣説中斗保命延生玄真妙經先北而後南次東而復西者蓋北斗位處坎宫宰御水源水屬於北以北為天天一生水故先授此經南斗位處離宫宰御火帝火屬於南以南為地地二生火故南斗真經次二授之其東斗西斗中斗五斗經文皆依造化次序言之故有其時也在太淸境上太極宫中經云無上大羅之天三清之境也玉清聖境十二聖天元始天尊所治玉清之下上清真境十二真天玉宸道君所治上清之下太清仙境十二仙天太上老君所治若在人身則上丹田泥丸府上應玉清宫中丹田絳宫府上應上清宫下丹田交會府上應太極宫太清境上正老君所治之宫名曰三皇洞神太清太極宫也觀見衆生億劫漂沉周回生死太上應化遍滿天下分身之處皆是太清太極宫也太上常以慈憫之心觀察衆生衆音終猶中也天居上地居下人居其中乃中方中土之生人也又作去聲者多也字義兩説也數至十萬為一億劫者結也亦云時也人之一生必備三千六百劫塵勞乃命分配定之結數也為世人肆行不道恣縱淫殺夭喪其身不能全其本年未能輪回生死前結未盡又有一生塵結積結億萬不能解釋正所謂行善事結良緣行惡事結鬼道若結惡多了則漂流苦海之中沉溺生死之內無有休息永為下鬼矣人能一日行一善事著一善功活一物命是解了三塵結即歷過三劫也若人日行一善則一年解了三百六十結又能在世活人生命濟人利物精修大道悟性歸真則百千萬億結塵勞一時盡滅謂如百年暗室若慧燈一照滿室光明梵語劫波此云時也不論時之長短延促多時少時通而言之謂劫也又謂霎時也如玉樞經云往昔劫中也天尊何嘗入劫耶即是往昔此時興此濟人之念也又劫者歇也蟄也如龜龍蟲蛇之屬伺雷收聲則隱歇其形雷鳴則出其形乃為一劫之名其牛馬羊犬雞豚禽畜之類亦各有劫但受諸苦而已故聖人立教於身三業中戒殺為上孟子云見其生不忍見其死聞其聲不忍食其肉是也三界之中亦皆有劫陽氣結為天為男陰氣結為地為女善人取惡妻聖賢生不肖乃煩惱結也善人遭賊吉人逢害乃生死結也入道之士若以道齡之言為心念念以善功方便解之則無此結也佛經有云解百生冤結若不解之世世相遇可不勉諸或居人道生在中華或生夷狄之中或在蠻戎之內或富或貴或賤或貧中華者即中國也東南曰揚州正南曰荆州河南曰豫州正東曰青州河東曰兖州正西曰雍州東北曰幽州河內曰冀州正北曰并州此禹貢别中國之九州也九州之外東曰夷西曰戎南曰蠻北曰狄經云人有五常十善之心孝弟忠良之行報生人道在中華之國富貴者因布施三寶惠貧拔苦拯難救危中來貧賤者因慳貪不捨取非義財物中來邊夷下賤者從殺生邪淫不信因緣中來此太上天眼觀見衆生所作罪福隨業而受報也暫假因緣墮於地獄人生在世稟於富貴貧賤之中蓋處之不以其道富者不義不仁不慈不施貴者不公不法不忠不勇貧者不安分賤者不伏下所以萬事萬理顚覆錯亂遂至災害生禍患作墮於煩惱也釋藏偈云福德力故今多順今多順兮放逸生放逸終無持戒心以是因緣入地獄正謂此也為無定故夫定者乃入道之要路延生之捷徑也定者正也身若不正豈能入道心若不正豈能延生延字之義亦從正從之又定者靜也向也止也決也水定則不流地定則不陷心定則萬慮息身定則萬事止性定則氣靈神定則氣清而定非靜不能成也蓋世人無靜向止決之力量則行義不能逹其道修真不能造其真是以心心不定業業相隨又豈能延生而明玄靈之本命耶玉樞經云能知止則泰定安大學云知止而後有定此知止是知有這箇道理須是得其知止方是如知為人子必孝知為臣必忠能得是身親為忠孝之道見得此事合當如此則志有定向心有止決乃是大力量之人如孟子云富貴不能淫貧賤不能移威武不能屈是也若心不定至於事親之際為私欲所汩不能盡其孝事君之際為利祿所汩不能盡其忠也今人有親不孝居官者不法處富貴者沽名有子者更娶是不知止不安分不守靜不豫決乃心無定故災必及其身矣人能知止安分守靜決定則不求生而自得延生未入道已達其道矣何災患之及焉上智之士若下靜定工夫心無蕢止久久成功小則延壽算入仙真大則朝玉帝禮三清也罪業牽纏魂繫陰司受苦滿足人道將違生居畜獸之中或生禽蟲之屬轉乖人道難復人身道釋二教戒十惡業殺盜邪淫貪嗔愚癡妄言綺語惡口兩舌皆訓人為善也此十惡業即姦盜詐偽在於法律禁斷非輕人有一犯枷禁牢獄手足杻械拷箠刺斷警迹鐐徒是與禽獸何異哉此章言人先世作業惡籍滿盈斗府三官檢核文移獄繫神魂拷掠報對若楚受足今得再生又作諸惡乃將違人道也後世即生畜獸之中禽蟲之屬是轉乖人道難復人身也如此沉淪不自知覺為先世迷真之故受此輪回知覺者曉悟也真者正也直也化也聖也靈通而妙明也天無真萬物不春地無真草木不根人無真不能御神成真者遇水不溺遇火不焚出三界化十方役萬神合一氣非真焉能得耶非真何能成耶所以北斗稱真君玄帝稱真武諸得道者皆稱真人吾夫子明德之論非真如何得知止定靜也真之一字豈易言哉太上哀憫世人生於中夏蠻夷富貴貧賤乃受天命於斯止向假此因緣為心無定故罪惡相聯將違人道此章欲令衆生省悟修真也不自知覺者因迷真道不入仙宗故不知所命之命夫命者定令也如天賦與富貴貧賤處之以道即如天命而然者樂天者也少有所賦非其命者即是迷真違命也既違命迷真則沉淪而不自知覺也凡奉真持訣之士能於知覺上尋出無可知覺方是得延生之訣也太上演教經旨幽微一句一字皆是訣法下學之士豈易窺測者哉若以文字近俗而鄙之徒憎謗訓罪根難滅也謂如不自知覺當太上授經之時緣何不言自不知覺其自不二字與不自二字大有懸絶亦與前後經旨不相干也蓋不字在上者乃不自去理會本來所命貴賤壽夭之因緣也不字在下自不知覺者却是不知所覺也不自知覺乃知其所覺之覺而不自悟也明矣謫經同志之士當味其經旨熟究深思庶不負太上垂教立言之聖意也乃以哀憫之心分身教化化身下降太上至神至聖大智大慈雖高居三境之中宴處九重之內而哀憫衆生之心無時少息也太上化身降於蜀都授此經訣饒益衆生度脫輪回之苦也至於蜀都蜀都者即今之成都府也漢明帝問僧摩騰曰法王在世何故化不及此對曰迦毗羅衛國乃三千大千世界之中心三界諸佛皆於彼土凡有願行者悉生于彼受佛正化咸得悟道餘處衆生無緣感佛佛不往也佛雖不往光明及處或五百年或一千年或千年外皆有聖人傳佛聲教而教化之何故太上降於蜀都餘方不往蜀乃坤維福地天師正一真君彼時於鶴鳴山修鍊九鼎丹成又能宣揚教化故降于彼以授經訣也地神湧出扶一玉局而作高座玉者天地日月之精華陰陽水火之結秀也潤而溫寶而貴萬載之不可朽滅也局乃曲腳之玉寶座也如普化天尊所座七寶層臺即珍寶嚴飾七級龍鳳之座也太上哀憫衆生降世説經三界萬靈孰不奉迎宜乎地神扶擁玉局以侍衛也説經已竟玉局復沉地中今玉局化洞乃成都之遺迹也於是老君升玉局座授與天師真人北斗本命經訣廣宣要法普濟衆生漢傳天師諱道陵字漢輔沛豐邑人留侯子房八世嫡孫名大順之長子也子房陰功隱行流芳後葉天師母初夢天神自北斗魁星中降至地長丈餘衣繡衣以蘅薇香授之既覺衣服居室皆有異香經月不散感而有孕於光武建武十年甲午正月望日生於吳地天目山時黃雲覆空紫氣盈庭空中光明如日經月復聞昔日之香浹日方散年及冠身長九尺二寸厖眉廣顙緑睛朱頂隆鼻方頭目有三角伏犀貫腦玉枕峰起手垂過膝美鬚髯龍踞虎步望之儼然雖親友見之肅如也七歲讀道德二篇十許遍而達其旨於天文地理河洛圖律之書皆極其妙通習墳典廣覽無遺從學者千餘人天目山南三十里西北八十里皆有講謫之堂臨安神仙觀餘杭通仙觀即其地也後起賢良方正直言極諌科中之身雖仕而志鍊形輕舉久之退隱北邙山三年有白虎銜符置座傍朝廷就徵為博士稱疾不起和帝即位以三品印綬駟馬車等徵為太傅後封冀縣侯三詔不就時永元四年壬辰歲也遂自河洛歷江淮名山遍禮洞府泝流入蜀及諸洞室遇神人告教獲丹書祕訣遂於鶴鳴山修鍊九鼎丹成未敢服謂弟子王長曰沖天之士當功及生靈佐國安家興利除害然後輕舉臣事三境則無愧焉茍利一身功不及民非大道弘濟之旨也至順帝時漢安元年壬午歲正月十五日午時感金闕後聖玄元道君即老君下降以正一盟威法籙三五斬邪之劍都功版劵職籙以授之遂服丹戰鬼置立治庭而後太上復以三洞衆經九百三十卷符籙丹竈祕訣七十二卷并冠服等以賜之至桓帝永壽元年屢授此經并五方五斗真經至永壽二年夫人雍氏同時白日升天位為太玄都正一真人三天扶教輔元大法天師也太上所授經訣即法也經中字字皆是要法奉道之士悟得一字一句一法一訣得離迷途直趨道岸道陵二字乃天師之名謫經至此雖臨文不諱然起敬之誠當以真人二字代謫之是時老君告天師曰人身難得中十難生假使得生正法難遇按四十二章經佛言人離惡道得為人難既得為人生中國難既處中國遇道者難又云世間得人身者如指瓜上土失人身者如大地之上太清境黃庭經云人以精為母以氣為主五臟各有精精中生氣五臟各有氣氣中生神神能生壽長生保命鍊精為丹養氣為神真仙上聖修真養氣自然而然內真外應有作必成自凡入聖男子之生先生右腎以外精而內血陰為裏也女子之生先生左腎以外血而內精陽為裏也腎生牌牌生肝肝生肺肺生心心生小腸小腸生大腸大腸生膽膽生腎腎生膀胱膀胱生三元三元生三焦三焦生八脈八脈生十二經十二經生十五絡十五絡生一百八十繼絡一百八十繼絡生一百八十纏絡一百八十纏絡生三萬六千絲絡三萬六千絲絡生三百六十五骨三百六十五骨生八萬四千毛竅三百日胎完氣足靈光入體與母生離而為人也人身難得信有之矣聖人應運二萬年為一劫二千年為一小劫降世賢人五百年然後一問世老君大聖人應運衆生得遇演説正經實難可得見矣得遇之人不生信向痛可惜哉夫天地之間人為貴人最靈上界為聖為真亦人能也下界為鬼為畜亦人化也蓋善善登上界惡惡降下世所以陰陽二氣得天之命令方得為男為女有若針芥之難投聖凡之難遇也哉道齡受先師之祕旨太上曾以三十二字真玄之竅訓度徂天師張真君云人身難得真妙難逢忽然輪回去無所從學道之士誠以守中自然湛寂與天地同此乃祖師得道之徑路也今道齡不敢固蔽併注此章願與同志共為進道之萬一云耳多迷真道多入邪宗多種罪根多肆巧詐多恣淫殺多好羣情多縱貪嗔多沉地獄多失人身夫人若失真道即入邪宗也罪根者指下文十惡業也巧詐者乃口業也淫殺者身業也情愛貪嗔者乃心業也罪根既植諸惡熾然而生墮於地獄失却人身也此章言多字之意者乃訓下愚非為上智之士言之也如此等緣衆生不悟不知正道迷惑者多已上諸多業報因緣乃太上明開大道彰施法網以示衆生不可觸入犯之以墮地獄失却人身而人自不省悟衣冠足以備禮御寒蔬食堪可充飢養素道德以富潤其身詩書以增廣其志祿仕可展其學藝業可贍其身而却不守其分不知其止不收放心不求真道恣情縱欲迷惑妄想膠膠擾擾念念馳驟步步投於惡業網中是誰之過歟我今哀見此等衆生故垂法教為説良緣令使知道知身性命皆憑道生了悟此因長生人道種子不絶世世為人不生無道之鄉不斷人之根本道由路也乃日用之間人倫事物所當行之理衆人之所共由者以教門言之道在太極之先超乎天地形器之外是未有天地萬物之初已有此道剖判之後在天為日月星斗風雨雷霆在人為仁義道德在地為草木山河在序為春夏秋冬在時為冷暖晦晴在教則存誠鍊性在法為功賞罪刑故太上曰大道無形生育天地大道無情運行日月大道無名長養萬物吾不知其名強名曰道佛氏亦以未有天地之先為吾真體先儒推原來歷謂由太虛有天之名由氣化有道之名天之所賦曰命命即令也人之所受曰性性即理也天無言如何命只是大化流行氣到這物便生這物如分付命令一般性是仁義禮智性之與命未嘗偏塞但人稟受却有清濁長短昏明厚薄之不齊故有富貴貧賤壽夭賢愚也若人稟氣至清至粹則為聰明神聖人也若清粹而高明則為富貴壽考之聖人也若高厚悠長則為聰明智慧忠正賢良節義之士也若稟氣薄惡而短者則為悖逆凶暴邪佞詭譎狠毒愚癡貧賤之人也此善惡雖因人之所稟亦由氣之所生也太上憫念世人故傳經訣以垂正教喻世法以説良緣善巧方便調攝衆生使其知道知身悟性悟命自獲真種既獲真種則長生人道世世生生若不棄背則不斷人之根本也此經太上豈特專為汲引下士之設若上智之士於此肯為究竟念念在斗息息存真則列仙有日矣更能心修正道漸入仙宗永離輪回超升成道太上大慈大悲至仁至聖教化羣生諄切至再始憐衆生稟受天命因無定故乖違人道不覺沉淪遂宣要法言人迷真道而不悟種罪根而不知故令知道知身悟性悟命皆憑道生不斷真種此章又慮世人不能出三界也謂道既能知更當修習時時不捨拳拳服膺漸入初乘積習既久守而不失用功用力至於徹悟休歇之場入仙宗離輪回成正道也我故示汝妙法令度天民歸真知命可以本命之日修齋設醮示汝者謂天師也妙法者即指下文於本命修齋設醮也天民者謂世人乃天所生之人民命天師廣垂濟度也如伊尹曰豫天民之先覺者也子將以此道覺此民是也雖然令其歸真知命却無下手之處於此可見矣太上慈悲方便開發衆生以六十日內令認取本命之一日清心齋戒制魄拘魂隨力醮獻投詞拜表禮號謫經俾初真之士不煩不簡不厭不疏易於入道使其漸漸修習行之既久於日日時時皆是本命如此勤求不怠珍重護持其功德力不可稱量也修齋設醮者道以齋為先經云雖有惡人齋戒沐浴則可以事上帝學道之士雖修齋而不持身口意業之十戒是空守節食於事無益反招愆也設醮者召也即召三界真靈也又曰詔欲人人啓寸心之誠拱伺帝之詔也又曰照乃然燈照人我之性也此乃醮之意也齋法有三一者設供齋修齋是也可以積德延年二者節食齋又名祭祀齋謂不飲酒不茹葷可以和神保壽中士所行也三者心齋謂疏灌其心除嗜欲也澡雪精神去穢纍也剖擊其志絶思慮也夫無思無慮則專道無嗜無欲則樂道無穢無纍則合道也心齋為上節食次之設供齋為下北斗七戒序云太上曰人身難得中土難生假使得生正法難遇三者既備幸莫大焉且夫天無私親常與善人茍能遠惡以從善捨妄以歸真者道豈遠乎哉然而道雖無方學則有序修真之要齋戒為先戒有七條第一戒者不得捨諸正念妄起非想因以成趣與道相違常當存神氣海入彼妙門第二戒者不得顯露馳騁泄慢靈文常宜愼密晝夜護持七年有功許傳後學第三戒者不得臨弔喪孝履諸厭穢致引外觸干犯正真常須澡潔內外清虛第四戒者不得食諸臭敗三厭五辛招集尸穢濁亂三宫常咽津液蕩滌靈源第五戒者不得面北便溺祼露三光冒觸神明致招殃咎雖居幽室亦當回避第六戒者不得酒食醉飽作樂無厭昏亂神氣閉塞靈關常須節約以適其宜第七戒者不得交遊非類妄習異端執心不一自無指歸常依正教不生疑惑以上七真之戒正是北斗經中之事實為玄功之初基登真之要路各當遵奉毋替初心倘如戒言則七戒仙官無不擁護留恩降福矣啓祝北斗北斗居天之中為天之樞組斡運四時凡天地日月五星列曜六甲二十八宿諸仙衆真上自天子下及黎庶壽祿貧富生死禍福幽冥之事無不屬於北斗之總統也人若誠心啓祝叩之必應三官五帝九府四司按玉樞經云天官解天厄地官解地厄水官解水厄五帝解五方厄東方青帝主木管肝護魂西方白帝主金管肺侍魄南方赤帝主火管心理氣北方黑帝主水通血中央黃帝主土脾主中宫主領五臟人配五行受形三官五帝無所不關也九府者上元三宫九府中元三宫九府下元三宫九府合二十七府上元三十六曹中元下元各四十二曹計一百二十曹總領天上天下人物靈仙鬼神羣類萬物悉皆關會斗宫以通內外之職四司者天曹四司則司命司録司非司危地府四司則司命司録司功司殺與三官五帝九府同檢察人間之罪福也太上垂教度脫此有相之外緣使人知懼改惡向善也若人以無為而內照之則諸神司皆備於我之身矣人形與天地相應頭圓居上象天足方居下象地北極為天之中央却在北故人之百會穴在頂心却向後日月往來只在天之南人之兩眼皆在南也北斗運轉四時旋行衆曜人心具衆理應萬事握化萬二千精元神千二百形影神流轉血氣通運百關衆神共護於心也三宫者三魂也又即人身之三元天地水三穴也五帝五臟也九府者九竅也四司者四肢也人能降制九竅攝養三魂調順五臟保運四肢不著邪境自戒俗情斷絶人我屏去是非漸入真道豈不快哉薦福消災奏章懇願世人於本命之日祈恩請福延壽消災懇禱之情具於詞章奏狀啓祝於北斗并諸司聖真者乃太上布法橋於迷津援衆生於大道人能知悟此身得遇良緣到於彼岸如犯罪人久禁囹圄之中幸遇曠蕩之恩當省躬責己改過知非洗濯其心以去惡沐浴其身勿染宿污則因其已新者而日日新之又日新之無有間斷則可為善人矣若恃有再土之路可延之門舊惡不悛新惡復造是知法令以故違憲條棄性命而就死地淪沒迷途墮沉惡趣失却人身悔之晚矣虔誠獻禮種種香花時新五果隨世威儀清淨壇宇法天像地或於觀宇或在家庭隨力建功請行法事功德深重不可具陳念此大聖北斗七元真君名號當得罪業消除災衰洗蕩福壽資命善果臻身凡有急難可以焚香誦經尅期安泰虔誠獻禮者即祭神之義也君子之祭七日戒三日齋必見其祭者誠之至也有其誠則有其神無其誠則無其神可不虔慤也哉威儀者內起恭敬悚懼誠恐之心外見仰瞻稽頓俯伏跪拜之節皆得其儀也臨范其民尚容止可觀進退可度況朝真禮聖而無威儀是不敬也隨力建功者乃高下陳設而不拘也上至王公大人尊宿長者德行偉人建齋設醮下及中庸貧病甘節苦行之士蠻夷賤隸之屬獻花酌水各盡己力陳以薦誠惟務精潔却不可居奢用儉處富用貧慳悴輕率穢觸嗔怒殃禍立至矣念此七元真君名號或禮本命真君須是滌除萬慮清淨身心塵念不萌然後謫之口念不如心念忽尓一見本心方是不負太上老君垂教之意當得尅期安泰而善果臻身也太上玄靈北斗本命延生真經注卷之一
