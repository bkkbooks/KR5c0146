front:
  text: 太上玄靈北斗本命延生真經注卷之四四寸
  hash: sha256:9f041f87bb9411f0d27c644713fe7f81278293e7828065108728790b48302edc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0146_HFL_004-001a, image: hfl/0527/0527-162.png}
body:
  text: 玄陽子徐道齡集注乾陽子徐道玄校正老君曰凡人性命五體悉屬本命星官之所主掌本命神將本宿星官常垂蔭佑主持人命使保天年本命星官者如子生人屬第一貪狼星君是也本命神將者如甲子丙子之神也本宿星官者陽則虛宿陰則女宿也太上初令世人知其性命皆憑道生既了悟此因即令歸真修奉延生解謝之門此章明人之五體悉屬本命星官主掌五體者即五臟也人若五臟安和則萬邪不侵百病不入永保長生本宿星宫蔭估其命知身則五體安和知道則長生久視和性則道心開發知命則使保天年也凡俗無知終身不悟夫本命真官每歲六度降在人間降曰為本命限期有南陵使者三千人北斗真君七千神將本命真官降駕衆真悉來擁護可以涓災懺罪請福延生隨力章醮福德增崇人生六十年為一大限之期全其本年是也乃平生一周换甲之期六十日為一小限即每年六度是也其日本命真君因所屬生人降在人間即於我身察録其罪福南陵使者乃破軍星君之使也故其中陰陽混合南斗關北辰北辰隱南斗也靈寶經云北斗落死南斗上土者分其門而説也故此經北斗二字皆總之也其無知不悟之凡愚恣造惡業違犯禁戒伐其天年則限數短促即死矣學道上智之士積功布德精修善業遵奉禁戒展其天年限次延遠福德增崇則得長生久視矣其有本命限期將至自身不知不設齋醮不修香火此為輕生迷本不貴人身天司奪祿減算除年多致夭喪迷悮之者雖遇經訣懷不信心毁謗真文如此之人身謝之後淪沒三塗漂沈諸趣永失人身深可悲哀自致斯苦天地上清下濁造化一陽一陰一日有晝有夜一年之內春生夏長秋殺冬成星有隱顯月有盈虧如列宿翼象二十二星虛壁止二星井宿三十三度鬼宿止四度天象尚有不齊人稟天地星斗陰陽五行造化而生故有富貴貧賤壽夭賢愚之異而人不悟賦分已定惟務妄想貪求於有限光陰造無窮罪業一度本命加臨一次死期將至不謝天地生成之德不感星真廕庇之恩既不貴重自身乃是輕生迷本必致夭喪其身迷誤之人得聞此經心生狂亂狐疑不信或見持誦不能思齊反生誹謗身死之後沉淪鬼趣受辛報苦劫盡才於地獄受果報之罪經中有見人持經偏眼邪視惡言謗讟不生敬仰或初雖信受後復慢易種種罪報不忍注釋學道之士豈侮聖人之言侮經則鬼崇來侵奉經則神聖皆迎既無功補於玄教焉敢謗毁其真文靈寶經云天司記人功過毫分毋失可不愼歟可不戒歟若本命之日能修齋醮善達天司一世於本命限期開轉此經廣陳供養使三生常為男子身富貴聰明人中殊勝太上慈悲方便設教故開示次序之法門使漸達生榮之境界歸奉真宗福報如是先令持號則罪業消除次命告斗醮謝轉經及認本命真君方獲安泰此見世一生之善也又持念真君名號宿有善緣言過去先世道心深重之故此二土也今能修齋設醮善違天司使三生常為男子身富貴聰明人中殊勝言未來之福報也玉皇本行經云智慧聰明轉女成男乃三十種內之上妙功德也又四十二章經云人離惡道得為人難既得為人去女為男難世人修奉得於三生常為男子身聰明富貴此有住相之福報也若能離有相之境升無為之鄉入希夷之門證虛無之道方可為人中殊勝之男子矣其有生身果薄雖在人中貧窮下賤縱知本命無力修崇能酌水獻花冥心望北極稽首禮拜念本命真君名號者亦不虛過本命限期皆得延生注福繫係人身災厄蠲除獲福無量天師歡喜踴躍作禮讚歎難可得遇無上法橋按金剛經云若人滿無量阿僧祇世界七寶持用布施若有善男子善女人發菩薩心者持於此經乃至四句偈等受持讀誦為人演説其福勝彼謂七寶有竭四句無窮若持於此經本心悟達則勝前以七寶布施之功德也富貴者廣設齋醮貧窮者酌水獻花同一是念福報等也奉道之士修齋設醮希求福利得福雖多而於識心見性了無所得惟成有漏之因如但以七寶持用布施也若人知性知命知道知身於本命之辰禮斗朝真獻花酌水不虛本命限期不希福報自感聖真延生注福無為功德勝前以七寶布施有為之福德也天師感激欣戴不知手舞足蹈讚嘆得遇此無上之大法橋也老君重告天師曰世人罪福善惡皆屬天司懺罪消災莫越修奉遇本命生辰告身中元辰驛馬削落三災九厄保見今眷屬安寧太上垂教立言隱奧玄微世莫可測此經乃哀憫衆生故宣要法以度羣迷叮嚀告誡曲盡人情使人易解易悟發信向知歸之心學道之士既能依經修奉當求聖意於經旨之外則登妙果入仙宗也謂如元辰驛馬如何削落災厄保眷屬安寧夫元辰者乃我身之神也驛馬者我之意神也人之元神外寄於目內藏於心目則外視於萬物內則心馳於萬機心目所馳神亦奔競人能收心內照馬不令馳保養形神胎息自固則三尸去體九蠱消亡災厄從何而至故能保我之六脈安和而百神調暢也凡有上士於本命生辰持此真文者外伏魔精內安真性功霑水陸善及存亡悔過虔恭漸登妙果重立玄功證虛無道乃得聖智圓通隱顯莫測出有入無逍遙雲際升入金門與聖合真身超三界永不輪轉壽量無窮快樂自在夫人之生有此身者有此神也身安則神健神健則氣清氣清則與道能合也悔過虔恭者懺罪也漸登妙果重立玄功者告元辰驛馬削去災厄使形神清靜自然延生也證虛無道者以太虛無上之道為證也聖智圓通者則慧光通明不致三尸九蠱之所害也隱顯莫測者言人能登妙果證大道智圓通則萬神拱護千真保迎氣結真玄神成妙道則出入金門之中隱顯人不可測也道藏云金門者非金闕金庭之名也金闕者乃三清玉帝之居處也金庭者即上聖高真之所居也此金門者在昊天之下三萬九千三百五十劫氣之下凝合變化為金門也凡初學精修得道之士天年終而不入輪回之道而飛上金門受諸逍遙快樂自在也此章乃經中之玄竅玄靈之祕要也凡諸同志肯以上帝之心為心道齡之言為言則自然獲福無邊成真在此章也凡有男女於本命生辰及諸齋日清淨身心焚香持此真文自認北極本命所屬星君隨心禱祝善無不應災罪消除致感萬聖千真俱來衛護此文所在之處千真敬禮萬聖護持魔鬼潛涓精靈伏匿世有災殃悉皆消滅夫人身三魂屬陽動以生也七魄屬陰靜以鎮也魂日居人體故曰陽主動魄夜居人身故曰陰主靜三魂於本命生辰及諸齋日歸身制御陰魄令邪道不侵百神交會魂安魄正陰與陽并不經苦惱身有光明人能清淨身心焚香謫經啓祝北斗及本命所屬星君則災罪消除道速成矣此經所在之處千真萬聖與七戒仙官敬遵天師誓願護持之際自有祥煙繞庭慶雲廕軒則何災不滅何福不臻也是名北斗本命延生經訣乃修真之徑路得道逍遙皆因此經證聖成真皆因此經出離生死皆因此經保護男女皆因此經保命延年皆得自在永為身寶福壽可稱保而敬之非人勿示此經廣大無量功德無邊凡俗下士豈易量哉諸大經典皆不切於北斗經也謂如靈寶只言度人却不曾説教人如何延生以入正道此經令人知命皆憑道生即是教人惜其本身知其本命知本命則自延生延生則非道不可延既能延則可受天真地聖之濟度也無本豈能度無根豈有果此乃本命延生之徑路修真入道之玄門也蓋靈寶者是其用也北斗經者是其體也學道之士所當敬戴太上已授前章經訣又名此經是名北斗本命延生經訣蓋慮薄德之人輕慢而不珍惜故又戒之夫人自修真道證聖成真出離生死則保我之心腎完矣心腎既完延年自在至於入金門抱玄靈之寶受逍遙之樂獲自然之福享無窮之壽倘非延生之訣何能至此境界耶此經非太上吝惜而不令普及若示之於不敬不信之人必生漏慢又從而謗之却是輕泄之罪也老君説經將畢龍鶴天仙來迎還於玉京是時天師受得妙法而作是言誓願流行以傳善士若有男女受持讀誦我當與七戒仙官所在擁護於是再拜老君而説讚曰家有北斗經本命降真靈北斗居天之中為天之樞組天地之權衡也天無斗不生無斗不成無斗不明無斗不行斗為量度之玄器也在人家豈可無之日用之間無斗不平無斗不行無斗不明無斗不成在人之一身非斗不生非斗不養非斗不護非斗不覆人之心上有七孔以應七星下有二竅以應輔弼又有三毫以法三台所以北斗在天居天之中在人居人之心心即北斗北斗即心如即心是佛即佛是心是也為何經中不言心却説家有北斗經蓋始因太上觀見衆生無門可進修真之路無誠以向禮斗之科是故特垂哀憫大闡玄靈授與天師經訣廣布流行普使世人皆躋仙阼不蹈輪回天師靜應真君上體聖意下利生靈為心故借喻人間一十五種利益之事以讚美之家即身也乃心之家舍也如人家安奉斗經供養真形修崇嚴潔千真敬禮萬聖護持若人心於十二時中行住坐卧之間念念不輟於北斗禮誦焚符必感本命玄靈降真氣於我身以保長生也此與後章皆有靈符計一十五道併開經後依法書篆佩帶焚爇則無不感應也家有北斗經宅舍得安寧心者神之舍形者氣之宅也人能常存北斗於身心之中則得身心清靜而外使家宅安寧也家有北斗經父母保長生本命元辰削落災厄保我延生我若不越修奉可保父母之長生也家有北斗經諸厭化為塵身心清淨思真念道何厭穢之不塵化也家有北斗經萬邪自歸正經云坎居下位離列上君主僕安分其道常存心即君主也心正則萬邪皆正矣家有北斗經營業得稱情朝奉真君則身中業障消除而營謀自然稱其情意也家有北斗經闔門自康健諸竅不漏浹洽真元則一身自然康健也家有北斗經子孫保榮盛長生種子之不絶必當培養令其榮盛也家有北斗經五路自通達五臟流通無有滯礙家有北斗經衆惡永消滅真性一悟萬罪消除家有北斗經六畜保興生六根安寂自然興生家有北斗經疾病得痊瘥精神不乏則百病痊愈也家有北斗經財物不虛耗財寶乃一身之正氣若不被外邪所耗則本元堅固也家有北斗經橫事永不起人身喻如屋宇堅完墻壁牢固何患驟雨狂風之傾摧也家有北斗經長保亨利貞長保玄靈則永獲亨利貞也老君曰善哉善哉汝可宣揚正教福利無邊普及衆生永霑勝善天師稽首禮謝信受奉行老君説經都畢天師讚歎已終萬聖歡欣得福利普霑於羣品諸天慶幸喜法教化及於十方延土有路朝聖得門太上使人人不入輪回天師闡世世流行妙道今道齡不揣其學擅釋玄文却非杜撰之辭實乃真全之本道齡非為己祈求以要譽欲使人請禱必得玄功也凡諸同志固當奉之敬之自得長生安泰也太上玄靈北斗本命延生真經注卷之四咒曰咒者即咒祝之義也以心通天以神合氣形聲相應則感格真靈矣天靈節榮願保長生天者無為之大也靈者無所不靈也天靈者言人最貴最靈也人頭頂之一穴百神朝聚之所關節流通真氣榮盛百病不生則長生可冀也太玄之一守其真形太玄之一者乃北方玄天坎宫正一之氣大道之子也為兩曜之根本乃萬物之祖宗也道德經云天得一以清地得一以寧人得一以靈即此玄一也昔黃帝同三一之道皇人曰子能知一萬事畢一者身之帝也守一則太一帝君在庭在則三萬六千神莫不皆在也守一之法暮夜正偃向上兩手撫心上祝曰天靈節榮願保長生太玄之一守其真形五臟神君各保安寧急急如律令男誦七遍女謫一十四遍畢思白氣如車輪大周其身赤氣在外便卧使人五臟安寧小則延年却惡大則成仙升舉也五臟神君各保安寧按內景經云心神丹元字守靈肺神皓華字虛成肝神龍煙字含明腎神玄明字玉嬰脾神長生字魂庭皆在心內運天經晝夜存之自長生謂五臟之神存之於我各保安寧矣急急如律令急急者疾速不停之義也如者似也律令者乃太上之勑萬神遵奉其身神奉行律令而得安且寧矣修真之士若能急急依太上之令奉行璇璣玄一之道者則神能舉形飛升可待也北斗長生聰明神咒北斗九真玉真仙靈貪狼巨門保臣長存祿存文曲使臣聰明廉貞武曲衛臣安寧破軍輔弼護臣身形常居吉慶永處福齡注上生籍除落死名神淸氣爽洞達九冥禦邪攝鬼羣妖摧傾學道修真所願遂成九皇覆護飛升紫庭弟子臣某下情無任瞻望恩光激切屏營至禱之至讚詠圓滿神咒大哉北極生物無息樞機運動乾坤定立太上垂教衆生遇植涓災解難神目電及臣今齋沐上帝可格克始克終保家保國諷誦真文作是惟一此經難遇劫數萬億既遇之者請必有得仁仁玄靈證明功德圓滿祝願靈章向來誦持經典已在周圓香雲騰舞於三天丹悃表宣於七曜金童傳信玉女通誠再伸十願之儀俯罄一心之禱伏願天真駐駕樞府停輪俯賜慈悲容臣祝願一願皇圖永固衍萬壽之無疆大道高明闡七元之有慶二願君敷仁愛臣盡忠貞八荒霑熙皥之風四海樂升平之治三願時和歲稔物阜民安父兄施慈愛之心子弟盡敬恭之道四願三塗五苦六道四生悉沾太上之恩均證人天之樂五願臣等先亡七徂俱超快樂之鄉見在雙親均享壽康之福六願臣等前傳師友同學門人魂神無被繫之牽氣數有飛升之步七願臣等修真有分進道無魔生生闡道德之風世世奉玄元之教八願侍經神吏護戒仙官假兹監衛之功勳悉遂進升於品秩九願侍香金童傳言玉女賈此腹心之丹悃達乎喉舌之真司十願城隍社令司命土神隨所守護於靈文常使導迎於景福臣誠惶誠恐稽首頓首再拜志心稱念三清三境天尊七元覆護天尊金真演教天尊功德無量不可思議
