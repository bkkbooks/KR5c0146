front:
  text: 太上玄靈北斗本命延生真經注卷之三寸三
  hash: sha256:83165318a13bd1aec9520ce37529000a662ae2fffe0ed84650598592532f0a04
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0146_HFL_003-001a, image: hfl/0527/0527-120.png}
body:
  text: 玄陽子徐道齡集注乾陽子徐道玄校正凡見北斗真形頂禮恭敬奉真之心常如整巾戴帽斯須不可離也朝真之誠當如面君事貴絲毫不敢怠慢則能感格於真靈矣北斗第一陽明貪狼太星君子生人屬之經云凡人之生皆是天氣正北位居中一氣生水萬物皆因水而生故北斗居中天而旋回四方主一切人民生死禍福北斗第一貪狼星為東斗主算第二巨門星為西斗記名第三輔第一第四輔第二第六武曲星正居本位為北斗落死第五廉貞星為南斗上生第七破軍星正居中位為中斗大魁總監衆靈凡一切萬物生死皆屬北斗洞明星外輔周回隱光內弼指十二辰濟生則總曰璇璣玉衡度死則總曰豁落若有衆生遇其疾厄隨方禳謝禱醮善無不應星君名魁字貪狼又名天樞又曰正星主陽德七陰名扶真君北帝神呪經曰名格字露神子又名天英字子然居太上宫青城玉樓中配事于天主天元并身子生人屬之管太陽真君室壁奎婁四宿節候陽明春生萬物所屬秦地徐州分野為天之太尉司政主非總九天上真中監五嶽飛仙下領後學真人天地神靈功過輕重莫不隸焉漢帝於終南山遇七元真君素衣垂髮帝問上聖真號七聖曰吾真號貪狼星名玉華靈皇夫人居靈華天又按九真帝君九陰混合縱景萬化隱天訣云北斗第一星中名太一宫帝變隱逃光宫中有帝君內妃名太一法垣子幸正扶著黃錦披丹青飛裙頽雲髻又星君姓上靈諱搖天槌戴九色芙蓉之冠絳衣紫裙九色青帔躡鳳文之履變形如鬼神披髮向上赤色面青左手持白棒右手按前又真形戴九晨玉冠青羽飛裳執斗中玄圖曰據斗真人號玉皇九宸君又曰樞宫大聖魁星君然燈曰身星明暗以驗吉凶真符曰延生之符諸在仙經隱名隨法立號也星圍九百二十里北斗第二陰精巨門元星君丑亥生人屬之星君名𩲃字巨門又名璇又曰法星主陰刑又名嬰真君又名正字貞文子又名天任字子全居中元宫五色玉樓之中配事于地主地元并命丑亥生人屬之管太陰星君胃昴畢觜四宿節候陰精秋成萬物所屬楚地益州分野為天之主宰主祿位上總天宿下領萬靈及學仙之人諸以學道及兆民宿命莫不隸焉又真君素衣垂髮名安上神華夫人居神華天又第二中元宫帝保胎化形內嬪名太一三甕字羅朱嬰赤錦披緑羽飛裙又姓育嬰諱激明光戴五色飛雲之冠紫衣黃裳七色錦帔躡虎文之履變形如美婦人披纓絡戴五色華冠執通明之扇以青衣女子侍從又真形戴玄精玉冠玄羽飛裳執五色羽節曰舉斗真人號玉皇北上宸君又曰璇宫大聖𩲃星君然燈曰命星真符曰度厄之符星圍五百五十里北斗第三真人祿存真星君寅戌生人屬之星君名𩵄字祿存又名璣又曰令星主中禍又名兆真君又名機字衛府子又名天柱字子素居真元宫黃臺玉樓之中配事于火主日元并福寅戌生人屬之管水星真君參鬼井柳四宿節候真人所屬梁地冀州分野為天之司空主神仙上總九天高真中監五嶽靈仙下領學道之人真仙之官莫不隸焉又真君素衣垂髮名靈精玄黃夫人居玄皇天又第三星真元宫六遁七隱上元丹母名太一虛夷字仲雙兆青錦披繡羽華飛裙又姓歸并諱處衆踏戴七色寶冠黃衣青裙五色絳帔躡龍文之履變形如二十歲美文夫花貌披草衣執筆多正面而立又真形戴飛雲寶冠青羽飛裳執斗中青籙曰履斗真人號玉皇主仙華宸君又曰璣宫大聖𩵄星君然燈曰福星真符曰保命之符星圍七百二十餘里北斗第四玄冥文曲組星君卯酉生人屬之星君名䰢字文曲又名權又曰伐星主天理伐無道又名盤真君又名光字子惠子又名天心字子裘居組幽宫朱臺玉樓中配事于木主月元并祿卯酉生人屬之管火星真君張星冀軫四宿節候玄冥所屬吳地荆州分野為天之遊擊主伐逆上總九天鬼神中領北帝三官下監萬兆伐逆不臣諸以凶悖莫不隸焉又真君素衣垂髮名上靈神妃華皇夫人居華皇天又第四組幽宫帝匿景藏光中元內妃名太一七烈字橫單盤紫錦披黃華羽裙又星君姓靈樞諱搖天柱戴六色盤龍之冠白衣絳裙三色黃帔躡龜文之履變形披髮執文字騎五色雲龍如婦人面回視廉貞星又真形戴三華寶冠丹錦飛裳執玄靈之節曰步斗真人號玉皇玄上飛華宸君又權宫大聖䰢星君然燈曰祿星真符曰益算之符星圍八百里北斗第五丹元廉貞綱星君辰申生人屬之星君名魓字廉貞又名衡又名殺星主殺有罪又名蘭真君又名橫字子衡子或云不附子又名天禽字子公居綱神宫素臺玉樓之中配事于土主江元并官職辰申土人屬之管木星真君角亢氐房四宿節候丹元夏以長養萬物所屬趙地兖州分野為天之斗君主命祿籍中統鬼神簿目下領學真兆民命籍諸天諸地莫不總統又真君素衣垂髮名靈妃元皇夫人居元皇天又第五綱神宫變體易景斗中大女名太一鬱昌字壽丘蘭朱錦披紫青飛裙又真星姓上開諱變五道戴五色華冠青衣白裙四色絳帔躡雲文之履變形獨髻騎白龍戴七寶冠從者四人各執戟從下又真形戴七寶飛天之冠白錦飛裳執青氣籙籍曰躡紀真人號玉皇金剛七晨君又號衡宫大聖魓星君然燈曰官職真符曰消災星圍七百二十里北斗第六北極武曲紀星君已未生人屬之星君名𩳐字武曲又名闓陽又曰危星主天倉五穀又名定真君又名衛字大車子又名天輔字子卿居紀明宫玄臺玉樓之中配事于水主河元并壽巳未生人屬之管土星真君心尾斗箕四宿節候北極三冬以收藏萬物所屬燕地揚州分野為天之太常主升進上總九天上真中統五嶽飛仙下領學者之身凡功勤得輪轉階級者悉總之焉又真君素衣垂髮名北上金蓋中皇夫人又第六紀明宫帝隱迹散衆斗中中女名太一氣精字抱定陵青錦披青繡飛裙又星君姓明靈諱昌上元戴翔鳳之冠玄衣錦裙龍文虎帔躡花紋之履又變形象頭人面仗劍披纓絡又真形戴飛精華冠紫錦飛裳執斗中玉册曰步罡真人號玉皇北宸飛華宸君又號闓陽宫大聖𩳐星君然燈曰壽星真符曰散禍之符星圍七百里北斗第七天衝破軍關星君午生人屬之星君名魒字破軍又名瑶光又曰部星亦曰應星主兵又名淑真君又名行字太賔子又名天衝字子翹又二名字一曰天蓬字子禽二曰天內字天成乃隱曜名也破軍星君關會宫九色玉樓之中配事于金主海元并妻妾午生人屬之管金星真君牛女虛危四宿節候天關所屬齊地豫州分野為天之上帝主天地機運四時長短天地否泰劫會之數莫不隸焉又真君素衣垂髮名玄上真皇夫人居真皇天又第七關會宫帝分景萬形斗中少女名太一郁墨字天凡叔丹錦披青華明羽裙又姓玄樞諱開天徒戴七星之冠丹衣錦裙虎頭文帔躡獅子文之履變現豬頭人面手持歡喜糰變形披白素衣口吐赤氣光明奪日立斗柄之頭又真形戴九雲之冠九色錦裳執揮神之策曰乘龍真人號玉皇總靈九元北蓋晨君又曰瑶天宫大聖魒星君然燈曰主妻妾真符曰扶衰之符星圍九百里北斗第八洞明外輔星君星君乃天之玉帝之星上總九天下領九地五嶽四瀆之仙官居帝席宫內紫氣玉樓之中姓精常諱上開字正延戴飛精寶冠九色鳳衣手執火鈴變形紫袍腰金帶幞頭執笏又隨諸國宰輔之服曰遊行三命真人號玉皇帝尊元晨君又號帝太常皇夫人居太常天又第八帝席宫帝化日月水火斗中高皇左夫人名太一石啓珠字落落茂華紫錦帔繡羽飛丹裙所屬燕地并州分野乃斗中外輔總承衆事司察天下萬國九州執政大臣罪福功過然燈禳謝衆災治病服藥以明吉凶也此輔星倚乎闓陽所以佐斗成功丞相之象也北斗第九隱光內弼星君星君乃天之大帝之星主變化無方仙真功過居上尊宫內紫館玉樓之中姓幽空諱冥陽暉字幽寥戴飛天寶冠手執帝章變形緋衣執圭出五色之氣又各隨諸國宰臣之服曰徘徊三陽真人號玉皇帝真元晨君又號變靈上皇夫人居變靈天又第九上尊宫帝化金石山河斗中高皇右夫人名太一滌夷條字雲育玄緑錦披繡羽華裙又皆頽雲髻乃斗中內弼總承衆事主察天下萬國九州執政大臣罪福功過然燈祈福應投事務明吉暗凶以驗之上台虛精開德星君中台六淳司空星君下台曲生司祿星君三台有六星兩兩而起其勢橫亘北斗第二𩲃星之前一曰天柱乃三公之位在天曰三台在人曰三公西近文昌二星曰上台為司命主壽次二星曰中台為司中主宗室東二星曰下台為司録主兵又曰上台司命為太尉中台司中為司徒下台司録為司空一曰泰階上台上星護助天子下星為女后中台上星為諸侯下星為卿大夫下台上星為士下星主庶人所以和陰陽而理萬物也按玉樞經云若人欲免三災九橫之厄即於靜夜稽首北辰北辰之上上有三台其星並躔形如雙目疊為三級以覆斗魁是名天階若人見之生前無刑囚之憂身後不淪沒之苦天階者乃太上升降之道也上台星君號通妙玄道天尊生生主者中台星君號仁化昭德延福天尊養養大神下台星君號靈源妙有空洞天尊護護天翁虛精六淳曲生者乃星君之內諱也人能知星君名號而誠心頂禮恭敬者則衆惡消除諸善備至凡於靜房端坐思三台覆頭次思兩腎氣從胸出與三台相連久久思畢啄齒二七遍以鼻微微出氣閉口滿咽而畢乃咒曰天靈節榮願保長生太玄三台守其真形五臟神君各保安寧復叩齒默禮而退即得魔障永除百事如意上台星君面色赤口吐赤氣道裝執碧玉圭乘黑雲頂有黃氣中台星君面色白口吐白氣遍滿天下道裝執白玉圭乘白雲頂有白氣下台星君面小而光芒千百氣如絲射暗立青氣中道服執青玉圭三台受虛無三氣明青黃白之正色乃調和陰陽之主即人之三魂也人非魂不生非魂不養非魂不護故言生養護矣凡人之身有魂則生生必養養必護矣若生養了不護則夭折也延生之訣正在此三字上修真之士既知三魂生養護我當悟我身既得其生必自調養既能調養必要愛護若不愛護於禁忌之日不貴身命則三魂離矣此身喪矣如是真君名號不可得聞凡有見聞能持念者皆道心深重宿有善緣得聞持誦其功德力莫可稱量切謂今年所食之粟乃去年所種之苗今得遇經之慶幸乃宿生奉斗之善因凡人得生聖世見聞妙經持念名號朝禮真形其功德不可思議果報亦不可思議也若正信男女值此真經智慧性圓道心開發出羣迷徑入希夷門歸奉真宗達生榮界人稟忠正誠信之資則具智慧圓明之性正則出羣迷之徑信可入希夷之門了悟真宗開弘大道豈不超達於長生之榮界也哉於三元八節本命生辰北斗下日嚴置壇場轉經齋醮依儀行道其福無邊世世生生不違真性不入邪見三元者乃三官主録百司上詣天闕進呈世人罪福之辰也八節者即立春春分立夏夏至立秋秋分立冬冬至此八日也乃五帝下降録人罪惡之辰也生年為本命生日為生辰身中萬神聚會之日北斗下日者昔漢明帝遇七真曰吾居七元宫謂之北極皆有華蓋相隨帝居於中其星皆生七寶光華燦爛號為北極帝君常月初三二十七日降下人間受人之醮祭察人之善惡此夜可於中庭立几筵精膳酒脯求度脫災厄延命益算及治邪考鬼滅精之法當此夜欲卧時先存華蓋九星在頭左北斗右北斗上北斗下北斗三台覆其中於卧室東面存二十八宿真官如嬰兒之狀著錦裙紫紗帔執青簡口吐玉光之氣入我口中皆為真氣匝滿身中得此道後乃為降靈之師萬鬼自怖也奉道之士得聞真君名號能持念者即能於降監之辰嚴置壇場轉經齋醮也世世生生者即宿有善緣道心深重今又能依儀行道其功德力莫可量也不違真性歸奉真宗不入邪見即出羣迷之徑也此太上慈悲諄切至再垂教世人奉斗朝真返邪歸正離俗升真之道也持經之人當誦七元真君所屬尊號善功圓滿亦降吉祥學道之士設醮朝真誦經持號修習既久念念不忘常雖堅持不退與斗真不相遠離自然感格錫之福壽而降吉祥也即説北斗咒曰北斗之説前章備載咒者祝也又讚揚斗真之聖德也奉道之士傾心敬謫存七元之相則禱無不應也此後前篇梵語神咒太上以此明示三界魔王之隱韻使朝真之士不為魔王阻路而得上徹斗司也焚語神咒曰唵詬嘛哪吸吸哪囉嘍哪唶唱哪𠯽唶哪𠶯𡃤哪㖿哪哪唵吽吽吽俱祇帝賖蘇吒阿若密吒烏都吒俱耆吒波賴帝吒耶微若吒俱囉帝吒耆摩吒薩婆訶北斗九辰北斗者乃天地之元靈神人之本命也九者乾道也陽體也生土而不少息也辰者乃衆星之宗主萬象之都會也是以斗居北方二隱七顯合為九位即人身中之九竅也中天大神中者不高不下之謂也又曰中者衆也天者無為無極之謂也大者至尊至尚也神者靈也明也正直而不曲也又曰神者伸也上天下地以正道也故北斗九辰居中天之內為衆天萬象尊尚靈明正大之真神也即世人心居中而元神為一身之主會也上朝金闕上朝者謁見也瞻仰也金闕者乃三清之化氣玉帝之真境也故九辰乃三清玉帝之腹心人能時時而朝禮之以盡報本之道也如人能以心神時時升入泥丸則真靈不散而得長生也下覆崑崙崑崙者載世之地名生萬物之化氣也故九辰日夜覆蓋者乃生生不絶之恩也如人身能將心火降於腎水則成真有功而丹不日自成矣調理綱紀調者調也又曰提掇也理者整束也綱者金木水火土五行是也紀者周天二十八宿也如九辰位居中天德侔三境所以提掇整束五行二十八宿不使紊亂經緯而乾坤得位日月順度神人得獲安逸也如人能調理五臟整東四大則百病不生而得真道也難經云智者能調五臟和是也統制乾坤統者通也又曰總也制者治也又曰御也乾者天也又曰陽道也神道也人道也坤者地也陰道也鬼道也邪道也又天動而地靜是也故九辰能通治天地之道陰陽之氣鬼神之機人邪之生滅如人能收拾水火以養心腎則延生之道明矣成矣大魁貪狼巨門祿存文曲廉貞武曲破軍大魁者最長之首也貪狼巨門祿存文曲廉貞武曲破軍者乃七元七星真君之名字也高上玉皇高者上無以加也上者尊之又貴玉者至寶也水火不能為疾也皇者至大之稱乃三界千真萬聖之主帝也故九辰體乎高上之大玉皇之尊也明矣如人朝真奉斗念念不息水火得攝鍊神氣結胎則可與高上玉皇為臣為使矣紫微帝君紫微帝君者乃北斗之主宰衆星之君父也所以引紫微為九辰三台之首也如人能居仕版不欺公妬法念念忠君則自然天與相之永無厄難也大周天界此七元真君動靜之機誠不可測各司下世賢愚之人本命大而能周遍上天下界無一物不係北斗七元之所出內也如人能將七情收斂則萬善自生也若心一向道則可大周其天而得逍遙快樂也細入微塵北斗七君神通莫測真妙難窺大可周遍上天下界小能潛入細微之塵皆可度人成真也世人莫以善小不為雖幽微塵土之中斗真亦能照察也經云君子愼獨者是也何災不滅何福不臻斗真既大周天界細入微塵惡必罰之善必賞之則何災不能滅耶災既消散其福必鍾也世人若能幽獨之中昭著之內心心奉斗念念守神則災不干福自來也元皇正氣來合我身元者大也萬善之長也皇者尊也正者不偏不倚之謂也氣者天地之元靈陰陽之妙化蓋北斗九辰乃元皇正大之氣結而成也人能以斗為心以斗為神則與元辰本命打為一團則元皇正氣來合我身何患不能長生久視矣天罡所指晝夜常輪天罡者乃天之正氣萬神之宗分天地非天罡不明上下運斗真非天罡不能通明令萬神非天罡不能玄妙也天罡之功大矣哉罡字之義從四從正者乃四聖治四方謂天蓬居東天猷居西翊聖居南估聖居北中乃大聖妙運天罡尊君主之也故天罡守中天以生為德以動為功得東西南北之正氣故曰天罡也天罡守中主土北斗屬水土以制之故能運北斗生萬物也非獨運北斗其月月一建即指一方故五斗皆從天罡所用也天罡一日之中每一時辰斡旋斗柄臨一方位時時運轉無有停息者乃生生不窮之理也按玉樞經云雷城十二門並隨天罡之所指罡星指丑其身在未所指者吉所在者凶何故有此吉凶乃天罡之體用即陰陽之氣也天罡正氣能生能殺若指向之處即是生方故有生氣取之可以治病補虛安神旺氣郤禍消災延生度厄也所在之處則有殺氣用之可以斬鬼驅邪夷凶禁暴馘毒制魔故所指者吉所在者凶天罡之德信不輕也天罡之功信不小也俗居小人好道求靈俗居者乃塵土世俗之居也小人者至杪小微賤之稱也此句乃起奉咒之士恭敬自謙之辭也人能得遇是經訣必當竭力盡心敬其道而得玄靈本命之延生矣願見尊儀永保長生既能好其道而得玄靈之訣則自然見其真形尊儀而得長生久視之道也三台虛精六淳曲生生我養我護我身形三台者乃中天之大化北斗之華蓋也真君之名號服相並注前篇一曰天城一曰天階一曰天相也即太虛之玄精神人之真氣也此三台即人之肺神三魂之總關也人能常誦是咒則得七魄清三魂安真氣降下生我養我護我而得長生神仙也又曰魂神為陽生我身也魄神為陰養我精也魂魄不離其身陰陽生化其精則北斗九辰與三台至聖千真萬靈常來衛護於我之身形也如此行之奉之則災厄從何而生也學者可不以道齡之淺見薄聞以為真文大道庶幾有補於將來也魁𩲃𩵄䰢魓𩳐纏尊帝急急如律令此北斗九辰之內諱也若人持誦至此則當著想尊容愈加敬禮而叩齒密謫愼勿朗宣禍福響應可不畏歟急急如律令者漢時公檄文移結語亦皆如是也如當今部符云符到奉行之義天師漢人故承用之教門遂得徂述也太上玄靈北斗本命延生真經注卷之三
