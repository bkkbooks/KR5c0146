front:
  text: 北斗經題辭寸一
  hash: sha256:766c3594b1d5c09f9c1974a71f332392d163c5a9c2125daae19f55d3d65d00c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0146_HFL_000-001a, image: hfl/0527/0527-004.png}
body:
  text: 題辭一章乃梓潼帝君之所作也其文備述北斗之玄玄中天之妙妙也凡諸同志欲誦北斗經先念題辭則知一經之始末也不可忽之北斗題辭者所以題號北斗之經眞玄之要訣法之首也北位也斗者萬象之尊尚也此經北斗之所化也故太上賦以北斗其厄難則各自有名北斗大聖也居乎中天而統三界也晝夜常輪無有休息運度死生故曰玄矣斗用柄轉爲柄所用而乃罡星符所令其斗也玄元始炁也或曰北斗即北極北辰之象故北倚於坎動靜而行亘於中也三台之覆能生養護分令成道北斗生有元靈難量其德萬象慈母三清之教任於紫光之妃化生備陰陽之道通五行尤長於延生永壽之始魔道縱横用邪爭强以侵眞妙當此之際孰能爲謀以爲上法玄玄大範將爲隳廢老君頓起故飛來於蜀欲度衆生以宣眞妙至道非一北斗本命祈禱災福生養之訣昭著幽微靡所不載時值正月初七曰而有地神於是玉局衆扶周天大世得道眞聖分班侍焉思濟斯民天師契合太上之心越班而請乎玄靈之事天尊凭几可其說北斗世莫知司天樞之紀録治地軸之動靜建歲運扇春風雍熙之和了歲時成三臘之窮冬自立世而無終焉是故垂道言以度後人太上有云我欲托之斯言不如載之眞訣之深切著明也於是斗眞並集所與高第弟子天師張道陵之屬補疑釋問遂自撰其本命之言成經一巷包羅天地揆叙萬類仁義道德性命禍福粲然靡所不備帝王公侯遵之則可以致長生契天道卿大夫士奉之則可尊君父保身命志士上智者持之則可以成仙道駕飛雲有縁人之修道二炁之正焉可謂玄而靈之延而生之覆世大聖之太玄者也太上自蜀闡化然後道正經訣各得其所乃分章有訣遂消厄得延生北斗後自垂光體三清之道而著作焉此眞常湛菽而明者也千百歲之遥傳布太上所言以爲靈寳靈寳者萬眞之總會六合之綱領也北斗之經則而象之漢天師傳斗於老君老君授以本命妙行尊問大道元始對以度人漢明帝遇斗於終南斗眞將玄靈而自授唐太宗受道於羊角元始曰汝爲天子安能何道不行哉㫖意合同若此者衆又有道德千言藴奧妙故說斗經爲徑其文不可弘深不與靈篇相似是以北斗本眞後世依倣而訛傳者也北斗不得靈者大道閉塞妙法無聞眞途迷惑耳耳流來北斗玄靈暗矣其經號爲本命故篇籍幸不泯滅聖朝求賢禮士開延道德是以清炁結聚修鍊之士明法注經授訣度人皆有其類故有古浙至士雖掌五刑之科肯與斯經通義特列北斗之明事謂之注文辭理長於引喻意不疏遠而道已獨至其言曰說詩者不以文害辭不以辭害志以意逆志爲得之矣斯經殆欲使後人徑知其妙故解其文不但作於爲己也前賢解者往往拾取而說之其說甚多世聖不同蜀都以來千百餘載傳之者亦已衆多道齡徐卿至眞無僞有自來矣侍父素菴崇道習儒弱冠之際遺志於經取長收要本有數家飛騰吏詮之内十有餘年心欲功補何勤能焉幸息肩弛檐於吴會之間潜心温故知新以盡瑣見全其所願遂其所志釋奥明玄庶補萬一余司文昌之星會英聚靈靡所不知歷代傳之於翰墨至今得明於教者惟北斗之訣後學之士釋而辯之者又自詳矣道齡存志北斗閎遠微妙開誦明見更書朝禮之科於是乃述己所聞證以經傳綉諸靈符具載本經章别其㫖分爲上下凡二十四厄總而言之不出乎本命者以啓後人可以釋疑破惑余亦字字訂其是非後之奉者盡其修養皆得長生不負玄陽徐道齡之用心共樂無上之逍遥不亦可乎誦北斗經訣凡謫經或朝禮先凝神叩齒端坐調息閉目靜思泥丸宫中有九宫九星各處一宫而坐七人如眞形之狀二人輔弼之服訖存天上北斗星光燦然如見即以舌拄上腭成金橋一道五臟出五色炁五條乗橋而上横亘斗中即呼四直使者從橋而入斗中通告某事次見擎羊陀羅二使者如玉女狀青衣仗劍一人執曼陀羅花一人執楊枝自斗中度橋而下入我身中九宫之内復出一室之中檢校都畢復入斗中良乆但見斗中九皇如己形中九人之服乗雲炁自橋而下入泥丸九宫之室與我對坐倏然合爲九人杳冥之際復合爲一人自泥丸宫中乗雲下入黄庭之内訖次端坐持誦淨口神咒出納之門上下有神吉凶之户炁津常存吾今朝禮一念存眞會集萬聖叩之必聞急急如太上律令勑淨心神咒天玄天玄眞一自然去邪歸正惟思靜專一身之主萬法之先定而不可測動而那可言臣今表裏靜引我拜帝前急急如太上元降律令淨身神咒靈寳徂炁安慰黄闕白帝清魂赤帝定魄黑帝生炁青帝養血黄帝中主萬神敢越前有朱雀後有玄武左有青龍右有白虎侍吾之身元神鼓舞各按方位同朝斗府急急如太上老君律令勑水神咒存想北方黑炁吸入水中誦開天地祕章灑之太一之精洞玄之靈能生萬物能滌羣情吾今灑蕩天地澄清急急如太上律令勑開天地祕章洞虚玄元晃朗無邊八方正炁混合自然靈寳司命普化九天豁落答那洞罡神仙斬絶惡鬼掃蕩妖煙中山玄咒元始靈篇吾誦神集天地回旋三元五嶽八海朝元魔王束首眞聖衛軒凶穢消散道德成全急急如太上老君律令勑北極靈章北極璇璣中天魁罡絡緯天地運轉陰陽德出萬聖位列九皇掃除惡穢普降吉祥喉舌之使陀羅擎羊雷門十二開指生光生物覆世振作紀綱吾總樞柄永鎭坎方龜蛇合體龍虎成行神劍一下斬絶魔王急急如北極玄天玉虚上相仁威上帝律令安神寳章杳杳冥冥混合無形玄元始炁天地人靈道非常道名無定名空洞凝結眞妙化生旣分五正始屬七星臣今蕩滌内外澄清功德圓滿魂魄自寧急急如天皇大聖老君律令勑北斗玄玄妙晶靈章北斗七眞朝共二尊隨時運建應炁常存天皇大帝紫微玄辰光明燭世大若車輪閉人死户開人生門二炁之化五行之君上朝元始下覆崑崙自子至午十二元辰請必免罪誦可蒙恩天罡掌握輔弼絲綸三官聽命五帝衛眞庚申甲子本命生辰隨力章醮福自臻身三千大將二萬靈神作惡减筭造善益津能清七魄能制三魂朗誦玄咒掃蕩妖氛急急如紫微大帝律令北極尊帝靈章北斗九君乃天地根扶危解難有方便門十二時屬三元炁存斡旋造化成就天人罡神指處鬼宿停輪吽鉢苛叱光徧乾坤漸樂和叱掃除妖氛今夕日凝結拘魄束魂内外清淨表裏更新三尸安位九靈守眞以合大聖混沌自分凡有祈請一一遂聞急急如太上元老天主律令勑開經無上妙晶靈章稽首太上尊歸命禮北斗仰啓二尊帝朝現七元君經始蜀都出道爲天人根消灾解危厄保命守玄眞南陵三千使北斗七千神俱來衛法座同入清淨門臣今志心誦道炁自然存
