front:
  text: 太上玄靈北斗本命延生直經註卷之五五寸
  hash: sha256:b4b3a5a39fb334cb2283cb40860716bf17356843d87ded4b76598513fd1f7f74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0146_HFL_005-001a, image: hfl/0528/0528-004.png}
body:
  text: 玄陽子徐道齡集註乾陽子徐道玄校正梓潼帝君奏請靈章表藳臣誠惶誠恐稽首頓首俯伏再拜昊天至尊金闕玉皇上帝御前臣聞天垂萬象由五斗而共北辰教闡三清應千靈而朝上帝璇璣乃陰陽之綱紀玄靈爲性命之根宗經垂千五百年失倫錯序道開萬二億劫隱竅藏玄非金聲無以叩金聲不玉㫖焉能明玉㫖道齡徐氏有夙縁累世之修靈寳玄機無纖芥微塵之漏蜀都演教缺要訣而秘靈符吴郡傳經開法門而指眞路前日進道齡之釋義今朝蒙上帝之宣恩乞頒鳳篆與龍文願降雲章同月牘普使人人受誦世世流傳臣不勝悚懼瞻天望聖激切屏營之至某年月日藁玄靈符法符者律令也可以召萬神禳衆惡也凡誦經朝斗之士齋沐澄潔整衣端坐先叩齒九通以聚九炁然後存天罡所指之方收炁來吹於紙上禳灾取白炁祈福取紅炁斬鬼驅邪取黑炁如此書了起身步丁字立定手搯斗文口誦北斗九辰之咒即焚之當加誠敬若有褻瀆則禍不免也各項眞符具載于後發爐符黄紙朱書滔乾文右符作用先叩齒凝神存東方天門開如曰初出之狀鼻引口吸吹在紙上書畢口誦密咒云九靈九靈合吾眞形水火得位内外洞明急如天律元亨利貞復爐符右符存想尊帝二星北斗七星金光朗耀吸來吹紙上竅内書玄元始三字塗九轉火筆出向上北極尊星寳章北極帝星寳章貪狼星君寳章巨門星君寳章禄存星君寳章文曲星君寳章廉貞星君寳章武曲星君寳章破軍星君寳章左輔星君寳章右弼星君寳章上台星君寳章中台星君寳章下台星君寳章天罡星君寳章二使者靈章本命降真靈章安寧宅舍章保父母長生章化厭為塵章萬邪歸正章榮業稱情章闔門康徤章保子孫榮盛章五路通達章消滅衆惡章興生六畜章疾病得痊章財物不耗章橫事不起章長保亨利貞章解三災厄章解四殺厄章解五行厄章解六害厄章解七傷厄章解八難厄章解九星厄章解夫妻厄章解男女厄章解産生厄章解復連厄章解疫癘厄章解疾病厄章解精邪厄章解虎狼厄章解蟲蛇厄章解劫賊厄章解枷棒厄章解橫死厄章解呪誓厄章解天羅厄章解地網厄章解地獄厄章解一切厄章後序道可名道非名常行是道名可道名非道常用是名昔永壽元年正月七日太上道徂老君降蜀都授天師張眞人北斗本命經訣蓋哀憫大地衆生迷惑眞途沈溺苦海不自知覺永無輪轉故垂旡上之法橋濟度存亡無物不被其澤而其好生之心乾乾不息則聖德玄功豈易言哉道齡甫自弱冠留志斯經但聞一善言見一善行必書之於簡册及取諸先賢先覺解藴釋奥之文未嘗去手日就月將玩味不怠始知我太上以是經是訣垂之於世特不虛設也洪惟北斗九皇天尊乃天地之樞機人物之陶冶司性命判生死運陰陽建歲時分晝夜立寒暑明貴賤化賢愚主禍福振紀綱開解謝之門指延修之徑上至帝王下及士庶皆由七星之主宰三台之生養也或云此經文辭淺近㫖意乖訛殊不知太上故以日用常行之事道之名之啓發愚蒙盡歸正道其上智之士當易境而行之則自然長生也何疑道齡吏遷吴中幸獲考滿暇日靜慮洗心截長補短别義綴章少明太上授受之餘意非敢爲訓詁之師也遂援筆臨文似有神助不逾月而集成噫道不遠人人能弘道此之謂歟道齡俚語鄙辭不足以宣揚聖化之萬一謹取前賢之訓以爲之釋其有不與經㫖相符脉絡失經之處余以日用常行之道切於己身者證而解之如宅舍得安寧註之曰修身正心六畜保興生註之曰屏六賊淨六根似不失本命之事實延生之要訣也夫道可名名可道如針芥之相投註幸備刊已就必聖眞而是相雖文理不精識見不廣則不敢索怪搜奇以眩高人之耳目也道齡愚誠以斯經力上析聖朝一人有慶萬壽無疆宫闈福千歲之秋臣宰輔三台之化下冀歲時豐稔民物安榮沉迷超碧落之天人我樂玄靈之道凡諸同志勿以人廢言當以命爲重謹序元統二年九月九日玄陽子徐道齡齋沐焚香再拜謹題太上玄靈北斗本命延生眞經註卷之五
