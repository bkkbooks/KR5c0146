front:
  text: 太上玄靈北斗本命延生真經注卷之二
  hash: sha256:3b06f9b422b9e8754cbaeb20478e83698844b2bfc7cf7c598be3a1775be9cb7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0146_HFL_002-001a, image: hfl/0527/0527-072.png}
body:
  text: 玄陽子徐道齡集注乾陽子徐道玄校正於是説大聖北斗解厄應驗曰大聖北斗七元君能解三災厄三災者乃星名也按玉樞經云世人欲免三災九橫之厄即於靜夜稽首北辰又按告斗之法亦有置三災星於斗口之前供養者良由此星操惡於諸惡之首也人命遇之能依法醮禳無不獲應矣又三災者雷嗔為天災火焚為地災覆溺為水災此初學之士不得真道在於梏囿之中厄運交會未免有此災厄今者幸遇禳解此二十四厄靈符若能持謫斗經禮拜斗懺認本命星君焚化靈符則可免也上智之士更能修鍊成真出乎天命氣數之外豈有此災並諸厄難也大聖北斗七元君能解四殺厄殺者即殺伐也蓋正人稟正氣惡人會惡殺也又四殺者四時不正之氣也春感之為溫夏感之為瘧秋感之為痢冬感之為嗽故曰四殺陰陽中之四殺者丑未辰戌居不正之方也又四殺與三殺七殺皆土家之惡神殺也若人犯之撓害非輕若能依法祈禱解禳則百無禁忌也大聖北斗七元君能解五行厄五行者即五臟也一經受病則一身不安也玉樞經云五行奇蹇九曜嶔𡼭謫玉經天尊命本人家司命六神上請北斗解一切厄若有此災依法保之禳之大聖北斗七元君能解六害厄六害者即身之六賊謂眼耳鼻舌身意也若不禁制則有害也玉樞經云三刑六害隔角交加若能預防朝真禮斗則可以解禳也大聖北斗七元君能解七傷厄七傷者人之七情謂喜怒哀樂愛惡欲也一有過度則傷身也又名七殺也解之愼之則無傷害也大聖北斗七元君能解八難厄難者難也即世人之身難逃之惡疾也謂癰痪癲癇風癆蠱癩此八者若非先曾延奉斗真今不能全備其體離其難也又八難者乃八景之異名也經云昊天諭三界真仙聖衆曰汝當戒八漏方可脫八難若能脫八難方可入三清八漏者目淚肝之漏不息壽不齡鼻涕肺之漏損則病必成口唾牌之漏去多勞本形外汗心之漏不收死不停睡涎腦之漏不閉神不靈小腸漏於腎不祕絶不生夜夢鬼與交神漏太分明淫欲不度節身漏無可憑如是八般漏乃為八難行若人奉北斗七情不妄驚情既不為害八難厄亦輕上智之士依而行之則能超脫也其有世人覺疾之作急當絶欲減膳志誠齋戒告斗謫經佩服靈符則可消禳也大聖北斗七元君能解九星厄九竅不制則起淫欲縱貪嗔之心也又即九曜嶔𡼭是也若能精修寶鍊奉斗朝真則何災不滅也大聖北斗七元君能解夫妻厄經曰父母生之續莫大焉男女居室人之大倫也世人夫婦失於婚合有犯神殺致生災厄北斗乃玉樞所司凡有此厄難至誠齋戒謫經禮懺告斗焚符以消禳之則夫婦和睦子孫昌泰也今人有妻有子或起淫泆之心或覬隨奩之産三妻五妾别籍異居爭財妬色蠱媚魘詛使夫婦參商父子狼虎至於遭刑蕩産殞命喪身者有之此自作孽也欲禱之於神而神豈受不臣之請也大聖北斗七元君能解男女厄子災嗣絶所致多端但以幼吾之幼以及人之幼更能立功種德則斗真不待禱而令解其災不伺求而默賜其子納寵幸妾非徒無益而又害之大聖北斗七元君能解産生厄婦人不擅專房之寵不懷妬忌之心即無産生之厄子孫亦衆多也若能改過首謝斗宫朝禮寶懺佩帶符篆持念所屬本命真君名號能解厄難也大聖北斗七元君能解復連厄按玉格云諸一切人雖有智能事多齟齬或成或敗徒有虛名疾病不瘥婚姻失時亦無嗣續或生男女不能長養而卒萬事不能從心者謂犯復連也皆是先亡不得超脫久久無人濟拔雖百千年終不能受生宜解之鍊度生界見在生人自然榮達作事遂意道齡訓玉樞經勞瘵乃尸疰之所致也尸疰變狀不一有傳尸殗殜肺痿骨蒸復連五種皆由虛損得之病源從腎起傳之於心則驚悸少氣夢見先亡故本經云先亡復連是也或問先亡不得超脫復連六親人何能知曰若犯此厄則感此病也既罹此厄急宜寡欲清心餌藥吞符祈告斗真超度徂玄俾亡者獲生善境存者厄解災消也大聖北斗七元君能解疫癘厄按消災經云若太白火星入於南斗則於國於家及分野處作諸障難者念此陀羅尼加持其災即除移於不順王命悖逆人身上受者佛豈移災乃為逆之人自招致耳疫毒流行患病闔門亡殁者蓋人居常不孝不忠不仁不義不敬天地不懼神明不禮三光不重五榖不修香火不貴其身恣意烹宰厭穢腥羶惡類相漸惡業相似惡氣相合之所致也若能修改自無此厄倘有傳染則齋戒禮斗佩奉靈符即得解禳也大聖北斗七元君能解疾病厄沉痾痼疾宿有冤愆暴病卒患因無攝養急須醮謝真君加之法藥相助必得扶衰解厄也大聖北斗七元君能解精邪厄邪妖尅害蓋心懷不正之感招精魅繳纏乃忘失奉真之故也若能依法禮斗朝真熱示靈符更尋天罡之所在能感正氣以摧之大聖北斗七元君能解虎狼厄陸逢虎狼蛇虺舟迎蛟蜃魚龍此乃動之厄理之常也若人先能皈命玉樞投誠斗府持念經號佩帶靈章預為防之豈遇是厄設或遭遇急投符於水火之中則其應如響大聖北斗七元君能解蟲蛇厄鳥鼠送妖蛇蟲嫁孽蓋人日常治家不理殺盜邪淫觸犯禁忌干瀆神聰遂致六神不居蛇怪乘間而入當持斗號懺謝過愆肅清家舍焚示靈符自感真氣以遣禳之大聖北斗七元君能解劫賊厄此乃慢藏不謹之自招積垛負償之所致人能預伸告解愼防不虞即得免也大聖北斗七元君能解枷棒厄若人妄遭托拾非罪干連或罹過誤之愆或被虛誣之執陷在縲絏之中備受枷棒之苦情雖負抑獄案文成官府避罪以稱疑家屬訴寃而不理當至心齋戒剖露衷情貝章啓奏祈告斗宫坐禁者亦齋心默禱內外合誠必能感格使之陰報陽應審理平反則解其厄也故犯法禁其可解乎大聖北斗七元君能解橫死厄非正命者皆名橫死若知有此厄難當建善功積陰德悔過省躬懇告斗府佩帶靈符必有起死回生之驗也若覆壓於巖墻之下刑戮於桎梏之中是自取其橫死非天為也禱之無益大聖北斗七元君能解咒誓厄盟詛咒誓蠱媚魘禱事有多端有希求愛媚者離間親情者有辜恩負義者設誓違盟者有析財不均者受抑無伸者有欲令死者使其疾苦者有信巫覡妄執人魂令其顚倒迷亂者或陰沉不語久伏於枕席之間者皆人身心不正或事處於過不及之偏之所致也若能退思於釁端推究損已責躬改已往之衍非修未來之善果更誦大聖之名號佩爇上帝之靈符即可解禳也大聖北斗七元君能解天羅厄天羅者乃天理也地網者乃人事也若為人上不犯國法下不逆人倫則四方上下皆得通行也永無羅障網罟之厄人若起是念必罹此厄違是道必遭此刑但能不越五常明立三綱更誠心澄慮以朝斗真則永得延生而入仙道也大聖北斗七元君能解地網厄此章上文併注已明未竟其説又地網天羅者即憲綱條格也世人不思富貴貧賤乃命分已定却不安分不知止違天命悖氣數作非法以犯國法棄性命以喪身命其地網天羅之厄豈能逃也人能安分懷刑保身守道更能禮斗朝真則自無此厄也大聖北斗七元君能解地獄厄此經功霑水陸善及存亡若人宿有寃業身謝之後執對冥府陰司孝子順孫欲逭九玄與之告斗禮懺赦其罪尤則生歸善人之道也大聖北斗七元君能解一切厄太上垂教演訊妙經使人延生保命度厄消災此諸厄難舉其大槩耳玉樞經有云北斗解一切厄世人但有厄難虔誠朝禮修設齋醮禮懺誦經焚符持號則無不響應也於是七元君大聖善通靈此篇乃入道修真之徑路延生禮斗之樞要解厄消災之訣法回生起死之關楗也太上列此於諸厄之後者欲人依法修持則無諸厄障自然升真證道也此言初真學道之士及善男信女若發誠心於此七元君降臨之日依科行訣誦經焚符奏章上表則七元君之威力神通大聖妙化善明萬靈之靈也濟度諸厄難超出苦衆生世人若欲消災謝罪解厄釋難告斗虔恭無不遂願以拔衆生沈溺之苦趣也若有急告者持誦保安平若人家或病或難或産或災或求嗣續或保延生急宜誠思定慮認本命星君之號持是訣謫是經焚是符則得家道清靜而患難尅期安泰也盡憑生百福咸契於五行斗真七戒云不得交遊非類妄習異端執心不一自無指歸常依正教不生疑惑人能盡心竭誠依憑經訣證道修真斗司當與其百福所為所作皆默合於五行造化也三魂得安健邪魅永消停五方降真氣萬福自來并三魂安健九靈屏迹我之五臟自生真氣真氣既生永保利貞則萬福自然合我之體也長生超八難皆由奉七星生生身自在世世保神清既得萬福來合我身則八難自然超脫如此則長生之道備矣本自七星之玄靈敬奉而得致也若能依前安置三魂調理五臟收三尸拘九靈離八難則是奉北斗之功驗矣必使其人生生不入梏囿得以自在與道逍遙則世世神清也善似光中影應如谷裏聲既得生生自在世世神清則元靈生慧光能燭萬物曲直之影是以有諸內必應乎外也三元神共護萬聖眼同明學道之士若能修持到此地位則天宫侍我魂地官侍我魄水官侍我神如此飛升金闕遊宴玉京則萬神萬目自然瞻禮而敬仰我也無災亦無障永保道心寧此篇包括經中旨要盡於此矣若能精修斗訣深造斗經則又豈有災障而永保奉道之心安寧也老君曰北辰垂象而衆星共之志書載北辰者北帝也一名北極亦號太辰故辰極為天心以正萬物北極為天樞以居其中不動為氣之主故衆星環繞而歸嚮之或言北辰垂象一句北之一字恐是此字指北斗而言庶與上下章旨貫通也道齡謂北斗為萬象之尊魁罡運轉晝夜常輪則衆星皆隨斗柄而行曰北辰者即北斗也北斗七星在太微之北微坦北極之前魁四星為璇璣杓三星為玉衡所謂璇璣玉衡以齊七政也吾夫子言政喻如北辰為政以德者即北斗斡運陰陽出內土死建四時統萬靈豈非政耶此夫子至聖之論也謹按别本延生經云太上曰天一生水生自北方故紫微之垣高崇北辰北辰之宿列為七元首引貪辰尾明破曜中立文曲以為天地之樞組也又三台星世為北斗之華蓋玉樞經云北辰之上上有三台其星並纏形如雙目疊為三級以覆斗魁是則皆與本經曰北辰即北斗又明矣雖然尚期待真人至士更與發明而加訂證之為造化之樞機作人神之主宰宣威三界統御萬靈在天為北辰在人曰性真北辰皆統衆星令三界而運造化正二三月斗柄用昏建寅卯辰之位以生萬物四五六月建巳午未而長養萬物七八九月建申酉戍以成熟萬物十月十一十二月建亥子丑之位而收藏萬物斗杓不運則四時不節五行不應寒暑失度陰陽不調生物不成矣所以為造化之樞機也性真能宰萬靈分善惡辨是非也判人間善惡之期世人以專行善事而多災禍者蓋善功未足善功既足其福至矣金剛經云受持讀謫此經若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業即為消滅是也有專行惡事而享福者乃惡未滿其惡盈時大禍至矣故太上曰惡不積不足以滅身蓋善惡之事各有期限者太上好生之德也為善者伺其大善具足為惡者伺其改悔善惡之期斯可明矣今人始務為善或持齋而不戒或禮斗而生嗔不依經旨而行持不求玄竅而進道謫經一過二過便願福壽兼全僅持號百聲千聲急欲資財茂盛倘有事物之違心或是艱難之阻障不能順受怨道咎師盟神詛佛是謗法之罪人也若為惡之人禍患在於隱微之間而未見即能悔過遷善向道歸真則百千萬惡即為消滅謂如積歲堅冰若慧日一照渙然而釋是以小惡不可不戒小善不可不為過勿憚改改之在速改過向善宜在限內設若過期禍將及矣孟子曰如知非義斯速已矣何待來年司陰府是非之目北斗聖功豈能盡迷然以此章言之下司神靈枉直功過鬼宫邪正勤怠苦爽幽魂之升滯四生六道之轉輪悉總屬於綱領也五行共稟七政同科歲里屬木角斗奎井四宿同科熒惑屬火尾室觜翼四宿同科太白屬金亢牛婁鬼四宿同科辰星屬水箕壁參軫四宿同科鎮星屬土氐女胃柳四宿同科外有房虛星昴四宿為之日宿乃太陽之舍配之屬火心危畢張四宿為之月宿乃太陰之舍配之屬水四七之星配五行二曜亦謂之七政北斗者天之體也五行二曜者天之用也故一體一用係乎動靜一動一靜係乎陰陽一陰一陽係乎天地一天一地係乎水火一水一火曰造而化之也造化之機璇璣是也所以北斗總動靜體用陰陽水火天地造化也然七政之用與北斗雖同科目原夫斗之為義大矣哉斗字從十從二斗總中天斡旋運度建四時以制八方均五行以齊七政為斗之用皆合十二數也在三清生九氣九氣生昊天紫微北極成十二位也在北斗七明二隱合三台亦十二位也在人身有五臟七竅在陰陽有十二支在人身有十二相屬在周天有十二雷門一年有十二月一日有十二時以此推之信乎天上地下無一物不係其斗之總統也同學至人能日日朝真時時禮斗自感斗真降真氣於身以延其生也有回死注生之功有消災度厄之力太上垂慈説此經訣本以消災度厄而回死注生者雖天命不可改移亦由人之修積故死可回而厄可解天定能勝人人定亦能勝天道齡伏睹太上洞玄靈寶朝天謝雷經中所載太上宣揚一事則知回死之功在人修積龍漢九年東平之郡義保之村有一人姓趙其性擁腫朴也忽因所幹步入州城路逢卜士云彼火色三日之內必受雷嗔是人歸家略不少露至第三日果大風雷雨黑暗乾坤是人曰天來誅我我當走野免致驚懼雙親以嚇弟兄於是執傘速至東郊外伺誅此一時地雷知念飛稟即差天雷司猛吏辛判官化作一俗人察此一事飛至傘下共之同戴是人曰天欲誅我我來待死汝速避勿在此久留要傘將去辛判官飛申天雷上奏上帝帝感如此加與三紀壽千日官祿緣其三事善釋三世之罪一知雷嗔不説是敬天也二走野待死者是愛親也三與合傘人言汝速避又與之傘者乃利人也因此三事遂得榮昌子孫綿遠回死注生之功豈非人之修積也耶上至帝王下及庶人尊卑雖則殊途命分俱無差别天地乃一氣人物無兩途昔漢明帝於終南山遇七元真君素衣垂髮帝稽首問曰未審是何仙聖真君曰吾是北斗七元真君下遊人間察録善惡帝叩頭再拜云仙者掌握何事真人曰吾上管諸天星宿下管五嶽四瀆三百六十名山三十六洞府地仙河源水族盡屬吾之所管并下元生人年命長短衣食官爵疾病刀兵刑獄分野興廢並是吾之僉注帝曰如朕還屬上真管否真君曰子雖為人主命與庶人一同帝拜曰凡目不識上真乃再啓曰朕欲求長生之道可修否真君曰子要求至道脫死升天子須堅勤何慮不得帝曰朕幸遇上真願賜傳授朕修事不虧兼綵繪真像畢生供養真君曰子至告於吾不可不傳緣子宿是上仙墜為人君吾今所宣是玄真祕術子須密行不可漏泄須發大願恭天順人慈和心性淫欲懈怠殺害妄想切在戒之欲得道通聖但依二時交乾步斗吞符誦咒存想醮拜功滿之日自然升仙矣帝曰朕當依法奉戒真君曰子當諦聽修身鍊形常至子後午前存身為枯樹以左手中指中節上緊搯定後想空身為一團真氣畢却想真氣為一真人青龍從肝出左白虎從肺出右朱雀從心出頂玄武從腎出足四神侍衛從乃步斗凡步斗春夏從魁星起秋冬從罡星起皆先從左足欲步斗時先以兩手中指中節緊搯口中默念魁𩲃𩵄䰢魓𩳐魒然後起左腳存斗蓋於頭以魁星在前罡星在後仍存金光照人即叩左邊齒七通咒曰上方世界八千人下方治地四將軍三五吏兵除惡鬼四六童子護我身六甲直符祛厭魅六丁玉女守吾身左有青龍右白虎上有朱雀下玄武前有功曹後主簿却除妖魅并魘蠱一切厭穢不得住須臾不去舉天斧急急如太上老君律令然後叩右邊齒七通咒曰太寧九宫太乙守房百神參位魂魄和同長生久視塞滅邪凶急急如太上老君律令真君曰此咒是太上金口所宣子當持此二咒神將靈童玉女自然隨子身守護驅使也瘟瘴傳尸刑獄刀兵永不近身帝曰上真到何日降下人間所食何物願賜一言朕當供養真君曰正月二十五二十六二月初二初七二十三二十六三月二十六四月十七二十七五月初五十三二十日六月初四初八七月初四二十四八月初二十一十九二十七九月初三十八十月初十二十六十一月初一初九十七二十五十二月二十日及每月初三二十七日庚申甲子吾下遊世間當以新熟果餅名華香藥細酒棗湯供養凡欲供養先以舌拄上齶存舌為度仙橋一道存五臟中出五色氣為五條五色祥雲乘起其橋直至吾斗中默呼直年直月直日直時使者從橋上去吾斗中云弟子某有某事請告於吾若見斗中一人如玉女托羊頭者名曰擎羊使者次見一人左手執劍右手托華盤者名曰陀羅使者此二人先來撿校所有供養不精專及穢觸皆此二人奏報若有異香紫雲入室者是吾七真及左輔右弼下降也子須於迥靜室中供養不得嗔怒常須歡喜勿令女人孝子僧尼等見如見觸於吾禍殃立至若能修行專志一有災厄之時但焚香告吾災禍自免不得妄為今道齡得此奠玄之迹不敢自祕而獨善其身故載此章惟願上智之士依法修持必獲感通以遂升真證道也凡夫在世迷謬者多不知身屬北斗命由天府有災有患不知解謝之門延福延生莫曉皈真之路斗為天地之準繩斗乃陰陽之陶冶生物生人運水運火故成四季令萬靈振十方冠三界自三清昊天玉樞之尊復有如北斗功德之大也耶人人頂戴北斗而不知身屬於斗却不精勤朝禮而修奉世人未免乎災患不臨身也縱然學道而道淺末學之人猶不免況在俗之人名利役其心而不知止酒色搖其精而不知戒厄會之時災患必生災患至矣尚不覺悟而皈真解謝惟信巫覡之妄烹宰羶腥以為祈禱或偶得痊瘥便為受神之福如其死亡則謂神不保庇也間有服藥多害物命者嗚呼爾欲求土彼亦惜命安可忍乎凡諸此者皆是不知解謝之門也知其門者則始於疹視服藥未愈禱之徂先祖先未應次求法助未驗必獲罪於天命災於星數矣必當以善功解之豈不聞春秋宋景公熒惑守心度主宋國災子韋曰禍當君可移於臣公曰相所以治國家也曰可移於百姓曰百姓死寡人將誰君曰可移於歲曰歲若飢人飢必死子韋曰君有至德之言三天必三賞君矣是夕熒惑乃退三舍信乎人之有災患可不以善功解謝之人能興一念之善行一善行則感鬼神動天地矣人有災於星數當求醮謝自認本命所屬星君解禳災咎更能三省其身思愆悔過至心歸身歸神歸命懇告斗宫則可以災患消除延生益算矣此乃解謝歸真之門路若不以良醫藥餌治病為功又不以告斗祀先為忱者則災將重矣病將危矣死將至矣致使魂神被繫禍患來纏或重病不痊或邪妖尅害連年困篤纍歲迍邅冢訟徴呼先亡復連或上天譴責或下鬼訴誣若有此危厄如何救解急須投告北斗醮謝真君及轉真經認本命真君方獲安泰以致康榮更有深妙不可盡述凡愚之輩迷謬之人貪欲是務惟利是圖蠹公營私損人益己信巫覡以禱祭淫祀啖官吏以吞併善良恣慘酷以拷捶奴婢逞顔色以嫉妬糟粳不有天地豈懼神明如此不能覺悟沉淪又作諸業轉土迷謬至於惡積禍盈時移事退病患來侵妖邪踵至人欲既盡天理昭回自於心上幻出許多危厄也太上慈悲大開解謝之門直指歸真之路若能悔愆首過不蹈前非投詞具奏醮謝真君禮認本命又能修真向道即康榮也更有深妙不可盡述者太上略示下文北斗真形名號靈符也太上玄靈北斗本命延生真經注卷之二
